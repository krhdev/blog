<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRHDev Tech Blog</title>
    <link rel="stylesheet" href="./assets/style.css">
</head>

<body>
    <header class="site-header">
    <img src="./assets/krhdev.png" alt="Tech Blog Logo">

    <h1>KRHDev Tech Blog</h1>

    <button
        id="theme-toggle"
        class="theme-toggle"
        aria-label="Toggle dark mode">
        🌙
    </button>
    </header>


    <div class="container" id="auth-card">
        <h2>Register</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="register()">Register</button>
        <hr>
        <h2>Login</h2>
        <input type="email" id="login-email" placeholder="Email">
        <input type="password" id="login-password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>

    <div class="container hidden" id="app-container">
        <h2 id="welcome-msg">Welcome</h2>
        <button onclick="logout()">Logout</button>
        <hr>
        <h2>Create a Post</h2>
        <input type="text" id="post-title" placeholder="Title">
        <textarea id="post-content" placeholder="Content"></textarea>
        <input type="file" id="post-image" accept="image/*">
        <div class="category-row">
          <select id="post-category">
            <option value="">No category</option>
          </select>
          <input type="text" id="new-category-input" placeholder="New category">
          <button class="btn-add-category" onclick="addCategory()">Add Category</button>
        </div>
        <button onclick="createPost()">Submit Post</button>
        <hr>
        <h2>Posts</h2>
        <div class="filter-row">
          <label for="category-filter">Filter:</label>
          <select id="category-filter" onchange="fetchPosts()">
            <option value="">All categories</option>
          </select>
        </div>
        <button onclick="fetchPosts()">Load Posts</button>
        <div id="posts"></div>
    </div>

    <script src="./assets/script.js"></script>
</body>

</html>
